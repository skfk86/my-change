<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator Challenge</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
    }

    .calculator{
      width:340px;
      background:#1e293b;
      border-radius:25px;
      padding:20px;
      box-shadow:
      0 0 20px rgba(0,0,0,.4),
      0 0 40px rgba(0,0,0,.2);
    }

    .display{
      width:100%;
      height:90px;
      background:#0f172a;
      border-radius:15px;
      margin-bottom:20px;
      padding:15px;
      color:white;
      text-align:right;
      overflow:hidden;
      display:flex;
      align-items:end;
      justify-content:end;
    }

    .display input{
      width:100%;
      background:none;
      border:none;
      outline:none;
      color:white;
      font-size:2rem;
      text-align:right;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:18px;
      font-size:1.3rem;
      cursor:pointer;
      transition:.2s;
      background:#334155;
      color:white;
    }

    button:hover{
      transform:scale(1.05);
    }

    button:active{
      transform:scale(.95);
    }

    .operator{
      background:#f59e0b;
      color:white;
    }

    .equal{
      background:#10b981;
      grid-column:span 2;
    }

    .clear{
      background:#ef4444;
    }

    .zero{
      grid-column:span 2;
    }
  </style>
</head>
<body>

  <div class="calculator">

    <div class="display">
      <input type="text" id="screen" readonly>
    </div>

    <div class="buttons">

      <button class="clear">C</button>
      <button>%</button>
      <button onclick="setOperatore('/')">÷</button>
      <button class="operator" onclick="setOperatore('*')">×</button>

      <button onclick="showScreen('7')">7</button>
      <button onclick="showScreen('8')">8</button>
      <button onclick="showScreen('9')">9</button>
      <button class="operator" onclick="setOperatore('-')" >–</button>

      <button onclick="showScreen('4')">4</button>
      <button onclick="showScreen('5')">5</button>
      <button onclick="showScreen('6')">6</button>
      <button class="operator" onclick="setOperatore('+')">+</button>

      <button onclick="showScreen('1')">1</button>
      <button onclick="showScreen('2')">2</button>
      <button onclick="showScreen('3')">3</button>
      <button onclick="showScreen('.')">.</button>

      <button class="zero" onclick="showScreen('0')">0</button>
      <button class="equal">=</button>

    </div>

  </div>
<script type="text/javascript" charset="utf-8">
  let display = document.getElementById('screen')
  let num1 = '',num2 = '' , operator = ''
  function showScreen(num){
    operator === ''? num1 = num : num2 = num
  if( num === '.' && display.value.includes('.'))
  return; 
  else{
    display.value += num
  }
  }
  function setOperatore(Op){
    if (num1 === '') {
      return
    } 
    const  ops = ['+','-', '/' , '*']
    let isNewOp = ops.includes(Op)
    let screenOp = ops.some(el => display.value.includes(el))
    if (isNewOp && screenOp){
      return
    }
    operator = Op
    display.value += '' +Op+ ''
  }
  function results(){
    
  }
</script>
</body>
</html>
